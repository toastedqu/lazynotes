version: 1
project:
  title: Lazynotes
  authors:
    - name: Q
  github: executablebooks/jupyter-book
  bibliography:
    - references.bib
  numbering:
    equation: false
  exports:
    - format: pdf
      template: plain_latex_book
      output: exports/book.pdf
  toc:
    - file: intro.md
    - title: Math
      children:
      - title: Probability Theory
        children:
        - file: math/prob/basics.md
        - file: math/prob/asymptotics.md
        - file: math/prob/bayes.md
      - file: math/info.md
      - file: math/linalg.md
    # - title: Consciousness
    #   children:
    #     - file: ac/intro.md
    # - title: Math
    #   children:
    #     - file: math/info.md
    - title: DL
      children:
        - file: dl/module.md
        - file: dl/loss.md
        - file: dl/optim.md
        - file: dl/train.md
        - file: dl/issues.md
    - title: RL
      children:
        - file: rl/rl.md
    - title: NLP
      children:
        - file: nlp/transformer.md
        # - file: nlp/models.md
        - file: nlp/train.md
        - file: nlp/infer.md
        - file: nlp/eval.md
    - title: Misc (NOT MAINTAINED)
      children:
        - file: misc/dsa.md
        - file: misc/meta.md
    - file: about.md
site:
  options:
    logo: logo.png
    folders: true
  template: book-theme
